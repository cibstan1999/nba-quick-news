name: Update NBA News

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch NBA RSS feeds
        run: npm run fetch

      - name: Check news freshness
        run: node scripts/check-freshness.mjs

      - name: Print fetch status
        run: |
          node -e "const data = require('./public/data/news.json'); console.log(JSON.stringify({ updatedAt: data.updatedAt, lastFetchStatus: data.lastFetchStatus, count: data.items?.length, top: data.items?.slice(0, 5).map((item) => ({ source: item.source, title: item.title, pubDate: item.pubDate })) }, null, 2));"

      - name: Commit updated news
        run: |
          if git diff --quiet -- public/data/news.json; then
            echo "No news changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json
          git commit -m "chore: update NBA news feed"
          git push

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
